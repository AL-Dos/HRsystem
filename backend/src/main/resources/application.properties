spring.application.name=backend

server.port=8090

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.springframework.security=DEBUG
logging.level.com.hrs.backend=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

jwt.secret=${JWT_SECRET}  

# 6 hours
jwt.expiration-ms=21600000 

app.cors.allowed-origins=http://localhost:4200

spring.profiles.active=local

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRESQL_DATABASE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}
supabase.bucket.person-photos=${SUPABASE_BUCKET_NAME}
supabase.bucket.person-signatures=${SUPABASE_BUCKET_NAME}